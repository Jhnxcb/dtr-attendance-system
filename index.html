<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DTR QR Scanner</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="scanner-panel">
        <div class="topbar">
          <div class="brand-title">
            <img class="brand-logo" src="static-logo.png" alt="Organization logo" />
            <div>
            <p class="eyebrow">Daily Time Record</p>
            <h1>QR Scanner</h1>
            </div>
          </div>
          <div class="clock" id="clock">--:--:--</div>
        </div>

        <div class="camera-stage">
          <video id="video" playsinline muted></video>
          <canvas id="snapshotCanvas" hidden></canvas>
          <div class="scan-frame" aria-hidden="true"></div>
          <div class="camera-status" id="cameraStatus">Starting camera...</div>
        </div>

        <div class="camera-tools">
          <label>
            Camera source
            <select id="cameraSelect">
              <option value="">Default camera</option>
            </select>
          </label>
          <label class="check-control">
            <input id="autoStartCamera" type="checkbox" />
            Auto-start scanner
          </label>
          <button id="refreshCamerasButton" type="button">Refresh Cameras</button>
        </div>

        <div class="controls">
          <button id="startButton" type="button">Start Camera</button>
          <button id="stopButton" type="button">Stop</button>
          <button id="exportButton" type="button">Export CSV</button>
          <a class="button-link" href="qr-generator.html">Generate QR</a>
          <a class="button-link" href="dashboard.html">Dashboard</a>
        </div>

        <form class="settings" id="settingsForm">
          <label>
            Google Apps Script upload URL
            <input id="uploadUrl" name="uploadUrl" type="url" placeholder="https://script.google.com/macros/s/..." />
          </label>
          <label>
            Supabase URL
            <input id="supabaseUrl" name="supabaseUrl" type="url" placeholder="https://project.supabase.co" />
          </label>
          <label>
            Supabase anon key
            <input id="supabaseKey" name="supabaseKey" type="password" placeholder="Paste anon public key" />
          </label>
          <label>
            Storage bucket
            <input id="supabaseBucket" name="supabaseBucket" type="text" placeholder="attendance-evidence" />
          </label>
          <label>
            Branch / Site Location
            <input id="branchSite" name="branchSite" type="text" placeholder="Kantibas, Cebu" />
          </label>
          <label>
            Email Edge Function URL
            <input id="emailFunctionUrl" name="emailFunctionUrl" type="url" placeholder="https://project.functions.supabase.co/send-attendance-email" />
          </label>
          <label>
            Manual staff ID
            <input id="manualCode" name="manualCode" type="text" placeholder="Use only if QR scanning is unavailable" />
          </label>
          <button id="manualButton" type="button">Record Manual Scan</button>
        </form>
      </section>

      <aside class="activity-panel">
        <div class="summary">
          <span id="scanCount">0</span>
          <p>records today</p>
        </div>

        <div class="last-scan" id="lastScan">
          <p class="muted">Waiting for first scan</p>
        </div>

        <h2>Recent Records</h2>
        <div class="records" id="records"></div>
      </aside>
    </main>

    <dialog class="photo-dialog" id="photoDialog">
      <button class="dialog-close" id="closePhotoDialog" type="button">Close</button>
      <img id="photoDialogImage" alt="Attendance evidence preview" />
    </dialog>

    <script>
      window.loadQrFallback = new Promise((resolve) => {
        const sources = [
          "https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js",
          "https://unpkg.com/jsqr@1.4.0/dist/jsQR.js",
        ];

        function loadSource(index) {
          if (window.jsQR || index >= sources.length) {
            resolve(Boolean(window.jsQR));
            return;
          }

          const script = document.createElement("script");
          script.src = sources[index];
          script.onload = () => resolve(true);
          script.onerror = () => loadSource(index + 1);
          document.head.appendChild(script);
        }

        loadSource(0);
      });
    </script>
    <script src="app.js"></script>
  </body>
</html>
